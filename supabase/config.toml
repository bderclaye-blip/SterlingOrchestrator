# Supabase project config for STERLING ORCHESTRATOR.
# Link with:  supabase link --project-ref hkgjybzinahwminzfgwg
project_id = "hkgjybzinahwminzfgwg"

# capture-thought is called by ElevenLabs (an external caller with no Supabase JWT),
# so JWT verification is off. The function authenticates with the x-capture-secret header.
# This is the config equivalent of deploying with --no-verify-jwt.
[functions.capture-thought]
verify_jwt = false

# time-session (Track A) is called by the same external agent — same shared-secret auth,
# same reason JWT verification is off.
[functions.time-session]
verify_jwt = false

# recall (Phase 3) — Sterling searches past captures. Same external caller, same secret auth.
[functions.recall]
verify_jwt = false
